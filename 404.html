<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Redirecting...</title>
<script>
  // GitHub Pages subdirectory fix:
  // If a widget or link navigates to /page.html instead of /quickteller/page.html,
  // this 404 page catches it and redirects to the correct path.
  (function() {
    var base = '/quickteller/';
    var path = window.location.pathname; // e.g. /dashboard.html
    // Only redirect if not already under /quickteller/
    if (path.indexOf(base) === -1) {
      var page = path.replace(/^\//, ''); // strip leading slash -> dashboard.html
      window.location.replace(base + page + window.location.search + window.location.hash);
    }
  })();
</script>
</head>
<body></body>
</html>
